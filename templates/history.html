<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Prediction History</h1>

<table border="1" width="100%">

<tr>
<th>ID</th>
<th>Disease</th>
<th>Description</th>
<th>Precautions</th>
</tr>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">⬅ Home</a>

</div>

</body>
</html>
